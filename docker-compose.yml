services:
  db:
    image: postgres:16-alpine
    container_name: touchgrass_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql
      - ./db/002_seed.sql:/docker-entrypoint-initdb.d/002_seed.sql

  adminer:
    image: adminer:latest
    container_name: touchgrass_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  pgdata:
